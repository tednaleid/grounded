name: grounded
options:
  bundleIdPrefix: com.tednaleid
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  grounded:
    type: application
    platform: macOS
    scheme:
      testTargets:
        - GroundedCoreTests
        - GroundedAdapterTests
        - GroundedIntegrationTests
    sources:
      - path: Sources
        excludes:
          - "**/.gitkeep"
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tednaleid.grounded
        PRODUCT_NAME: grounded
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/grounded.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES

  GroundedCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CoreTests
        excludes:
          - "**/.gitkeep"
      - path: Sources/Core
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tednaleid.grounded.core-tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete

  GroundedAdapterTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/AdapterTests
        excludes:
          - "**/.gitkeep"
      - path: Sources/Adapters
        excludes:
          - "**/.gitkeep"
      - path: Sources/Core
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tednaleid.grounded.adapter-tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete

  GroundedIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/IntegrationTests
        excludes:
          - "**/.gitkeep"
      - path: Sources/Core
        excludes:
          - "**/.gitkeep"
      - path: Sources/Adapters
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tednaleid.grounded.integration-tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
